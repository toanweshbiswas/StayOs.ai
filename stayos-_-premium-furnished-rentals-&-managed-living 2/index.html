    <style>
      html {
        scroll-behavior: smooth;
        background-color: #F2EFE9;
      }
      body {
        font-family: 'DM Sans', sans-serif;
        background-color: #F2EFE9;
        color: #242424;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        overflow-x: hidden;
      }
      
      /* Global Paper Grain Texture */
      .paper-texture {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 9999;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.08'/%3E%3C/svg%3E");
        opacity: 0.6;
        mix-blend-mode: multiply;
      }

      /* Subtle Vignette for Physical Feel */
      .vignette-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 9998;
        background: radial-gradient(circle at 50% 50%, rgba(242, 239, 233, 0) 60%, rgba(220, 215, 205, 0.4) 100%);
        box-shadow: inset 0 0 80px rgba(0,0,0,0.02);
      }

      /* Glass/Vellum Island Effect - Optimized for Readability */
      .glass-panel {
        background: rgba(255, 255, 255, 0.75); /* Increased opacity for better text contrast */
        backdrop-filter: blur(20px) saturate(180%);
        -webkit-backdrop-filter: blur(20px) saturate(180%);
        border: 1px solid rgba(255, 255, 255, 0.5); 
        box-shadow: 
            0 8px 32px 0 rgba(31, 38, 135, 0.05),
            inset 0 0 0 1px rgba(255, 255, 255, 0.2); 
      }

      h1, h2, h3, h4, h5, h6, .font-serif {
        font-family: 'Playfair Display', serif;
      }
      
      .font-blackletter {
        font-family: 'UnifrakturMaguntia', serif;
      }

      /* Custom Selection Color */
      ::selection {
        background: #047857; /* Updated to Green */
        color: white;
      }

      /* Editorial Scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #F2EFE9; 
        border-left: 1px solid rgba(0,0,0,0.08);
      }
      ::-webkit-scrollbar-thumb {
        background: #D1CDC4; 
        border: 2px solid #F2EFE9;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #999; 
      }

      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }

      @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(40px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .animate-fade-in-up {
        animation: fadeInUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }
      
      @keyframes marquee {
        0% { transform: translateX(0%); }
        100% { transform: translateX(-100%); }
      }
      .animate-marquee {
        animation: marquee 40s linear infinite;
      }
    </style>

              'fade-in-up': 'fadeInUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards',
            }
          }
        }
      }
    </script>
